    <circle cx="700"  cy="200" r="3"/>
    <circle cx="900"  cy="400" r="2"/>
    <circle cx="1100" cy="250" r="3"/>
    <circle cx="1300" cy="450" r="2"/>
    <circle cx="100"  cy="400" r="2"/>
    <circle cx="300"  cy="600" r="3"/>
    <circle cx="600"  cy="500" r="2"/>
    <circle cx="900"  cy="600" r="3"/>
    <circle cx="1200" cy="650" r="2"/>
  </g>

  <!-- Math formulas -->
  <g font-family="Georgia,serif" fill="#4a9eff" opacity="0.1" filter="url(#soft)">
    <text x="80"   y="200" font-size="22">∇²ψ + k²ψ = 0</text>
    <text x="1100" y="150" font-size="18">e^(iπ) + 1 = 0</text>
    <text x="920"  y="320" font-size="15">∫₋∞^∞ e^(-x²) dx = √π</text>
    <text x="60"   y="480" font-size="20">f(x) = Σ aₙxⁿ</text>
    <text x="1050" y="560" font-size="16">∂²u/∂t² = c²∇²u</text>
    <text x="280"  y="690" font-size="14">P(A|B) = P(B|A)·P(A) / P(B)</text>
    <text x="720"  y="730" font-size="19">λ = h / mv</text>
    <text x="1180" y="710" font-size="13">det(A) = Σ(-1)^(i+j) aᵢⱼ Mᵢⱼ</text>
  </g>

  <!-- Code snippets -->
  <g font-family="'Courier New',monospace" opacity="0.09" filter="url(#soft)">
    <text x="900"  y="195" font-size="13" fill="#00ff9d">import numpy as np</text>
    <text x="900"  y="213" font-size="13" fill="#82aaff">def gradient(f, x):</text>
    <text x="916"  y="231" font-size="13" fill="#c3e88d">    return np.grad(f(x))</text>
    <text x="100"  y="600" font-size="13" fill="#00ff9d">for x in range(∞):</text>
    <text x="116"  y="618" font-size="13" fill="#f78c6c">    dream(x)</text>
    <text x="530"  y="138" font-size="13" fill="#c792ea">class PolarDream:</text>
    <text x="546"  y="156" font-size="13" fill="#82aaff">    def __init__(self):</text>
    <text x="562"  y="174" font-size="13" fill="#c3e88d">        self.limit = ∞</text>
  </g>

