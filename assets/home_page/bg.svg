<svg viewBox="0 0 1440 810" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050d1a"/>
      <stop offset="45%"  stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <radialGradient id="g1" cx="80%" cy="20%" r="50%">
      <stop offset="0%"   stop-color="#00ff9d" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="15%" cy="85%" r="45%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <rect width="1440" height="810" fill="url(#bg)"/>
  <rect width="1440" height="810" fill="url(#g1)"/>
  <rect width="1440" height="810" fill="url(#g2)"/>
  <rect width="1440" height="810" fill="url(#g3)"/>

  <!-- Aurora streaks -->
  <ellipse cx="1100" cy="80"  rx="400" ry="60" fill="#00ff9d" opacity="0.05" transform="rotate(-8 1100 80)"/>
  <ellipse cx="900"  cy="60"  rx="300" ry="40" fill="#3b82f6" opacity="0.05" transform="rotate(-5 900 60)"/>
  <ellipse cx="300"  cy="730" rx="350" ry="50" fill="#7c3aed" opacity="0.04" transform="rotate(6 300 730)"/>

  <!-- Constellation lines -->
  <g stroke="#3b82f6" stroke-width="0.6" opacity="0.1">
    <line x1="200"  y1="150" x2="450"  y2="300"/>
    <line x1="450"  y1="300" x2="700"  y2="200"/>
    <line x1="700"  y1="200" x2="900"  y2="400"/>
